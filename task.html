<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tasks - Solver</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body class="page-transition">
    <header class="header">
        <div class="container">
            <h1 class="brand">Solver</h1>
            <button class="menu-toggle" aria-label="Menu">
                <span class="three-dots">⋮</span>
            </button>
            <nav class="dropdown-menu hidden">
                <a href="index.html" class="menu-item">Home</a>
                <a href="notes.html" class="menu-item">Notes</a>
                <a href="achievement.html" class="menu-item">Achievement</a>
                <a href="accounts.html" class="menu-item">Account</a>
            </nav>
        </div>
    </header>

    <main class="page-content">
        <div class="container">
            <div class="page-header">
                <h1 class="page-title">Tasks</h1>
                <div class="task-stats">
                    <span class="stat">0 pending</span>
                    <span class="stat completed">0 completed</span>
                </div>
            </div>
            
            <div class="input-group">
                <input type="text" id="newTask" placeholder="What needs to be done?" class="input-field">
                <button id="addTask" class="btn btn-primary">Add Task</button>
            </div>

            <div class="tasks-list" id="tasksList">
                <!-- Tasks will be populated by JavaScript -->
            </div>
        </div>
    </main>

    <script src="script.js"></script>
</body>
</html>
