<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tasks - Solver by Indus</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@200;300;400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <!-- Same navbar as index -->
    <nav class="navbar">
        <div class="nav-container">
            <div class="logo">
                <div class="logo-main">Solver</div>
                <div class="logo-sub">by Indus</div>
            </div>
            <div class="nav-links">
                <a href="tasks.html" target="_blank" class="nav-item active">Task</a>
                <a href="achievements.html" target="_blank" class="nav-item">Achievement</a>
                <a href="rewards.html" target="_blank" class="nav-item">Rewards</a>
                <a href="account.html" target="_blank" class="nav-item">Account</a>
            </div>
        </div>
    </nav>

    <section class="page-content tasks-page">
        <div class="container">
            <h1 class="page-title">Task Management</h1>
            <p class="page-subtitle">Your daily priorities, beautifully organized.</p>
            
            <div class="task-demo">
                <div class="task-list">
                    <div class="task-item">
                        <div class="task-checkbox"></div>
                        <span>Plan weekly goals</span>
                        <div class="task-time">Today 9AM</div>
                    </div>
                    <div class="task-item completed">
                        <div class="task-checkbox checked"></div>
                        <span>Review yesterday's progress</span>
                        <div class="task-time">Done</div>
                    </div>
                </div>
                <div class="task-input">
                    <input type="text" placeholder="+ Add new task..." class="task-input-field">
                </div>
            </div>
        </div>
    </section>
</body>
</html>
