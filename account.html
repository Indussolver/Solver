<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Account - Solver</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body class="page-transition">
    <header class="header">
        <div class="container">
            <h1 class="brand">Solver</h1>
            <button class="menu-toggle" aria-label="Menu">
                <span class="three-dots">⋮</span>
            </button>
            <nav class="dropdown-menu hidden">
                <a href="index.html" class="menu-item">Home</a>
                <a href="task.html" class="menu-item">Task</a>
                <a href="notes.html" class="menu-item">Notes</a>
                <a href="achievement.html" class="menu-item">Achievement</a>
            </nav>
        </div>
    </header>

    <main class="page-content">
        <div class="container">
            <div class="page-header">
                <h1 class="page-title">Account</h1>
                <p class="page-subtitle">Manage your profile</p>
            </div>

            <div class="profile-card">
                <div class="profile-avatar">
                    <span id="avatarInitials">UI</span>
                </div>
                <div class="profile-info">
                    <div class="input-group">
                        <input type="text" id="userName" placeholder="Your name" class="input-field">
                        <input type="email" id="userEmail" placeholder="your@email.com" class="input-field">
                    </div>
                    <button id="saveProfile" class="btn btn-primary">Save Profile</button>
                </div>
            </div>
        </div>
    </main>

    <script src="script.js"></script>
</body>
</html>
