<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Notes - Solver</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <!-- Notes List View -->
    <div id="notesListView" class="view active">
        <header class="header">
            <div class="container">
                <h1 class="brand">Solver</h1>
                <button class="menu-toggle" aria-label="Menu">
                    <span class="three-dots">⋮</span>
                </button>
                <nav class="dropdown-menu hidden">
                    <a href="index.html" class="menu-item">Home</a>
                    <a href="task.html" class="menu-item">Task</a>
                    <a href="achievement.html" class="menu-item">Achievement</a>
                    <a href="accounts.html" class="menu-item">Account</a>
                </nav>
            </div>
        </header>

        <main class="notes-main">
            <div class="container">
                <div class="hero-header">
                    <h1 class="hero-title">Solver Notes</h1>
                    <p class="hero-subtitle">
                        Designed for you<span class="gradient-glow">...</span>
                    </p>
                </div>
                <div class="notes-grid" id="notesGrid">
                    <!-- Notes will be rendered here -->
                </div>
            </div>
        </main>

        <!-- Floating Action Button -->
        <button class="fab" id="newNoteBtn" title="New Note">+</button>
    </div>

    <!-- Full Screen Editor View -->
    <div id="editorView" class="view editor-view hidden">
        <div class="editor-overlay" id="editorOverlay"></div>
        <div class="editor-container">
            <!-- Editor Header -->
            <div class="editor-header">
                <button class="btn btn-icon btn-cancel" id="editorCancelBtn" title="Cancel">
                    <svg viewBox="0 0 24 24" fill="currentColor"><path d="M19 6.41L17.59 5 12 10.59 6.41 5 5 6.41 10.59 12 5 17.59 6.41 19 12 13.41 17.59 19 19 17.59 13.41 12z"/></svg>
                </button>
                <div class="editor-title-input-wrapper">
                    <input type="text" id="editorTitle" class="editor-title" placeholder="Untitled">
                </div>
                <button class="btn btn-primary" id="editorSaveBtn">Save</button>
            </div>

            <!-- Editor Content -->
            <div class="editor-content">
                <textarea id="editorContent" class="editor-textarea" placeholder="Write your note..."></textarea>
                
                <!-- Checklist -->
                <div class="checklist-container" id="checklistContainer">
                    <div class="checklist-header">
                        <span>Checklist</span>
                        <button class="btn-add-checklist" id="addChecklistItem">+</button>
                    </div>
                </div>

                <!-- Reminder -->
                <div class="reminder-container">
                    <button class="btn-reminder-toggle" id="reminderToggle">
                        🔔 Add Reminder
                    </button>
                    <div class="reminder-picker hidden" id="reminderPicker">
                        <div class="picker-inputs">
                            <input type="date" id="reminderDate" class="picker-date">
                            <input type="time" id="reminderTime" class="picker-time">
                        </div>
                        <button class="btn-reminder-save" id="saveReminder">Set Reminder</button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Delete Confirmation -->
    <div class="confirm-modal hidden" id="deleteConfirm">
        <div class="confirm-content">
            <div class="confirm-icon">🗑️</div>
            <h3>Delete Note?</h3>
            <p>This action cannot be undone.</p>
            <div class="confirm-actions">
                <button class="btn btn-secondary" id="cancelDelete">Cancel</button>
                <button class="btn btn-danger" id="confirmDelete">Delete</button>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
