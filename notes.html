<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Notes - Solver</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body class="notes-body">
    <header class="header">
        <div class="container">
            <h1 class="brand">Solver</h1>
            <button class="menu-toggle" aria-label="Menu">
                <span class="three-dots">⋮</span>
            </button>
            <nav class="dropdown-menu hidden">
                <a href="index.html" class="menu-item">Home</a>
                <a href="task.html" class="menu-item">Task</a>
                <a href="achievement.html" class="menu-item">Achievement</a>
                <a href="accounts.html" class="menu-item">Account</a>
            </nav>
        </div>
    </header>

    <main class="notes-main">
        <div class="container">
            <div class="notes-header">
                <h1 class="notes-title">Solver Notes</h1>
                <p class="notes-subtitle">
                    Designed for you<span class="gradient-text">...</span>
                </p>
            </div>
            <div class="notes-grid" id="notesGrid"></div>
        </div>
    </main>

    <!-- Floating Action Button -->
    <button class="fab" id="newNoteBtn">+</button>

    <!-- Note Editor Modal -->
    <div class="modal hidden" id="noteModal">
        <div class="note-editor">
            <div class="editor-header">
                <h2>New Note</h2>
                <div class="editor-actions">
                    <button class="btn btn-cancel" id="cancelBtn">Cancel</button>
                    <button class="btn btn-save" id="saveBtn">Save</button>
                </div>
            </div>
            <div class="editor-body">
                <input type="text" id="noteTitle" class="input-title" placeholder="Title">
                <textarea id="noteContent" class="input-content" placeholder="Write your note..."></textarea>
                
                <!-- Checklist Section -->
                <div class="checklist-section">
                    <div class="section-header">
                        <h3>Checklist</h3>
                        <button class="btn-add-checklist" id="addChecklistBtn">Add Item</button>
                    </div>
                    <div class="checklist-items" id="checklistItems"></div>
                </div>

                <!-- Reminder Section -->
                <div class="reminder-section">
                    <button class="btn-reminder" id="reminderBtn">
                        🔔 Set Reminder
                    </button>
                    <input type="datetime-local" id="reminderInput" class="input-reminder hidden">
                </div>
            </div>
        </div>
    </div>

    <!-- Cancel Confirmation -->
    <div class="modal hidden" id="cancelModal">
        <div class="confirm-dialog">
            <div class="confirm-icon">?</div>
            <h3>Cancel Note?</h3>
            <p>Are you sure you want to cancel writing this note?</p>
            <div class="confirm-buttons">
                <button class="btn btn-continue" id="continueBtn">Continue Writing</button>
                <button class="btn btn-confirm-cancel" id="confirmCancelBtn">Yes, Cancel</button>
            </div>
        </div>
    </div>

    <!-- Delete Confirmation -->
    <div class="modal hidden" id="deleteModal">
        <div class="confirm-dialog">
            <div class="confirm-icon">🗑️</div>
            <h3>Delete Note?</h3>
            <p>This action cannot be undone.</p>
            <div class="confirm-buttons">
                <button class="btn btn-secondary" id="cancelDeleteBtn">Cancel</button>
                <button class="btn btn-danger" id="confirmDeleteBtn">Delete</button>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
