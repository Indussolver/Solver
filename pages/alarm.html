<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Solver — Smart Alarm</title>
  <link rel="stylesheet" href="../css/main.css">
</head>
<body class="page">
  <header class="site-header">
    <div class="brand">Solver</div>
    <nav class="nav">
      <a href="./index.html" class="nav-link">Home</a>
      <a href="./timer.html" class="nav-link">Work Timer</a>
      <a href="./achievements.html" class="nav-link">Achievements</a>
      <a href="./account.html" class="nav-link">Account</a>
      <div class="menu-dots">⋮</div>
    </nav>
  </header>

  <main class="container">
    <section class="section-head">
      <h1 class="page-title">Solver Alarms</h1>
      <p class="page-sub">Design your wakeup routine — set smart challenges so you don't oversleep.</p>
    </section>

    <section class="alarm-setup card">
      <h2>New Alarm</h2>

      <label class="field">
        <div class="label">When</div>
        <input id="alarm-time" type="time" class="input input-sm">
      </label>

      <label class="field">
        <div class="label">Label</div>
        <input id="alarm-label" type="text" placeholder="Morning routine" class="input input-sm">
      </label>

      <label class="field">
        <div class="label">Challenge type</div>
        <select id="alarm-challenge" class="input input-sm">
          <option value="math">Math problems</option>
          <option value="shake">Shake phone</option>
        </select>
      </label>

      <label class="field small-grid">
        <div>
          <div class="label">Difficulty / Count</div>
          <input id="alarm-count" type="number" min="1" max="50" value="5" class="input input-sm">
        </div>
        <div>
          <div class="label">Snooze (mins)</div>
          <input id="alarm-snooze" type="number" min="0" max="30" value="5" class="input input-sm">
        </div>
      </label>

      <div class="controls">
        <button id="save-alarm" class="btn primary">Save Alarm</button>
        <button id="clear-form" class="btn ghost">Clear</button>
      </div>
    </section>

    <section class="alarm-list card">
      <h2>Saved Alarms</h2>
      <div id="alarms-container" class="list"></div>
    </section>
  </main>

  <!-- Alarm trigger modal -->
  <div id="alarm-modal" class="modal hidden">
    <div class="modal-panel">
      <div class="modal-header">
        <h3 id="modal-title">Alarm — Solve to stop</h3>
        <button id="modal-close" class="btn ghost">Close</button>
      </div>

      <div id="modal-body" class="modal-body">
        <!-- dynamic content injected -->
      </div>

      <div class="modal-footer">
        <button id="modal-snooze" class="btn ghost">Snooze</button>
        <button id="modal-stop" class="btn danger">Stop</button>
      </div>
    </div>
  </div>

  <script src="../js/main.js"></script>
  <script src="../js/alarm.js"></script>
</body>
</html>
