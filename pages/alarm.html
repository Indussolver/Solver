<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smart Alarm - Productivity Pro</title>
    <link rel="stylesheet" href="../css/main.css">
    <link rel="stylesheet" href="../css/layout.css">
    <link rel="stylesheet" href="../css/components.css">
    <link rel="stylesheet" href="../css/animations.css">
    <link rel="stylesheet" href="../css/alarm.css">
</head>
<body>
    <!-- Navigation (same as index) -->
    <nav class="nav-bar">
        <div class="nav-brand">
            <a href="../index.html">🚀 Productivity Pro</a>
        </div>
        <div class="nav-links">
            <a href="alarm.html" class="nav-link active" data-page="alarm">🔔 Alarm</a>
            <a href="focus.html" class="nav-link" data-page="focus">⏱️ Focus</a>
            <a href="achievements.html" class="nav-link" data-page="achievements">🏆 Achievements</a>
            <a href="account.html" class="nav-link" data-page="account">👤 Account</a>
        </div>
    </nav>

    <main class="main-container alarm-container">
        <!-- Alarm Controls -->
        <section class="alarm-controls">
            <div class="add-alarm-form">
                <input type="time" id="alarm-time" class="time-input">
                <label class="label-switch">
                    <input type="checkbox" id="alarm-active">
                    <span class="slider"></span>
                </label>
                <button id="add-alarm-btn" class="btn-primary">Add Alarm</button>
            </div>
        </section>

        <!-- Alarms List -->
        <section class="alarms-list" id="alarms-list">
            <h2>Your Alarms</h2>
            <!-- Alarms populated by JS -->
        </section>

        <!-- Challenge Modal -->
        <div id="challenge-modal" class="modal hidden">
            <div class="modal-content">
                <h3>Complete Challenge to Dismiss!</h3>
                <div id="challenge-content"></div>
                <button id="challenge-submit" class="btn-primary">Submit</button>
                <button id="challenge-snooze" class="btn-secondary">Snooze</button>
            </div>
        </div>
    </main>

    <!-- Scripts -->
    <script src="../js/utils.js"></script>
    <script src="../js/alarm/alarm-storage.js"></script>
    <script src="../js/alarm/alarm-core.js"></script>
    <script src="../js/alarm/alarm-challenges.js"></script>
    <script src="../js/alarm/alarm-ui.js"></script>
</body>
</html>
