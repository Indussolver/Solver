<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Timeflow by indus</title>
    
    <link rel="stylesheet" href="./css/style.css">
    
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@200;400;500&display=swap" rel="stylesheet">
</head>
<body>
    <div class="app-wrapper" id="app">
        <header class="fade-element">
            <div class="brand">Timeflow <span class="author">by indus</span></div>
        </header>

        <main>
            <div class="timer-display" id="time-display">25:00</div>
            
            <div class="controls fade-element">
                <button id="start-btn" class="primary-btn">Start</button>
                <button id="pause-btn" class="secondary-btn hidden">Pause</button>
                <button id="reset-btn" class="icon-btn">Reset</button>
            </div>

            <div class="modes-container fade-element">
                <div class="modes-pill">
                    <button class="mode-btn active" data-time="25">Focus</button>
                    <button class="mode-btn" data-time="5">Break</button>
                    <button class="mode-btn" id="custom-toggle-btn">Custom</button>
                </div>
                
                <div id="custom-input-area" class="custom-area hidden">
                    <input type="number" id="custom-minutes" placeholder="Min" min="1" max="180">
                    <button id="set-custom-btn">Set</button>
                </div>
            </div>
        </main>

        <footer class="fade-element">
            <div class="performance-section">
                <div class="perf-item">
                    <span class="perf-label">Today</span>
                    <span class="perf-value"><span id="session-count">0</span> sessions</span>
                </div>
                <div class="perf-item">
                    <span class="perf-label">Focus Time</span>
                    <span class="perf-value"><span id="total-focus-time">0</span> min</span>
                </div>
            </div>
        </footer>
    </div>

    <audio id="alarm-sound" src="https://assets.mixkit.co/active_storage/sfx/2869/2869-preview.mp3" preload="auto"></audio>
    
    <script src="./js/script.js"></script>
</body>
</html>
