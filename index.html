<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>timeflow by indus</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@200;400;500&display=swap" rel="stylesheet">
</head>
<body>
    <div class="app-wrapper" id="app">
        <header class="fade-element">
            <div class="brand">timeflow <span class="author">by indus</span></div>
        </header>

        <main>
            <div class="timer-display" id="time-display">25:00</div>
            
            <div class="controls fade-element">
                <button id="start-btn" class="primary-btn">Start</button>
                <button id="pause-btn" class="secondary-btn hidden">Pause</button>
                <button id="reset-btn" class="icon-btn">Reset</button>
            </div>

            <div class="modes fade-element">
                <button class="mode-btn active" data-time="25">Focus</button>
                <button class="mode-btn" data-time="5">Break</button>
                <button class="mode-btn" id="custom-btn">Custom</button>
            </div>
        </main>

        <footer class="fade-element">
            <div class="session-tracker">
                <span class="dot"></span> Sessions: <span id="session-count">0</span>
            </div>
        </footer>
    </div>

    <audio id="alarm-sound" src="https://assets.mixkit.co/active_storage/sfx/2869/2869-preview.mp3" preload="auto"></audio>
    <script src="script.js"></script>
</body>
</html>
