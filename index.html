<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>timeflow by indus</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500&display=swap" rel="stylesheet">
</head>
<body>
    <div class="container" id="app-container">
        <header>
            <h1 class="brand">timeflow <span class="author">by indus</span></h1>
        </header>

        <main class="timer-section">
            <div class="timer-display" id="time-display">25:00</div>
            
            <div class="controls">
                <button id="start-btn">Start</button>
                <button id="pause-btn">Pause</button>
                <button id="reset-btn">Reset</button>
            </div>

            <div class="modes">
                <button class="mode-btn active" onclick="setTimer(25)">Focus (25m)</button>
                <button class="mode-btn" onclick="setTimer(5)">Break (5m)</button>
                <button class="mode-btn" onclick="setCustomTimer()">Custom</button>
            </div>
        </main>

        <footer>
            <div class="session-tracker">
                Sessions Today: <span id="session-count">0</span>
            </div>
        </footer>
    </div>

    <audio id="alarm-sound" src="https://assets.mixkit.co/active_storage/sfx/2869/2869-preview.mp3" preload="auto"></audio>
    
    <script src="script.js"></script>
</body>
</html>
