<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rewards - Solver by Indus</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@200;300;400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <nav class="navbar">
        <div class="nav-container">
            <div class="logo">
                <div class="logo-main">Solver</div>
                <div class="logo-sub">by Indus</div>
            </div>
            <div class="nav-links">
                <a href="tasks.html" target="_blank" class="nav-item">Task</a>
                <a href="achievements.html" target="_blank" class="nav-item">Achievement</a>
                <a href="rewards.html" target="_blank" class="nav-item active">Rewards</a>
                <a href="account.html" target="_blank" class="nav-item">Account</a>
            </div>
        </div>
    </nav>

    <section class="page-content rewards-page">
        <div class="container">
            <h1 class="page-title">Rewards</h1>
            <p class="page-subtitle">Earn points. Unlock perks.</p>
            
            <div class="points-display">
                <span class="points-number">1,247</span>
                <span class="points-label">Solver Points</span>
            </div>
            
            <div class="rewards-grid">
                <div class="reward-card">
                    <div class="reward-icon">⭐</div>
                    <h3>Premium Badge</h3>
                    <span class="reward-cost">250 pts</span>
                </div>
                <div class="reward-card">
                    <div class="reward-icon">🎨</div>
                    <h3>Custom Themes</h3>
                    <span class="reward-cost">500 pts</span>
                </div>
            </div>
        </div>
    </section>
</body>
</html>
