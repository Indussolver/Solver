<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Notes - Solver</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body class="page-transition">
    <header class="header">
        <div class="container">
            <h1 class="brand">Solver</h1>
            <button class="menu-toggle" aria-label="Menu">
                <span class="three-dots">⋮</span>
            </button>
            <nav class="dropdown-menu hidden">
                <a href="index.html" class="menu-item">Home</a>
                <a href="task.html" class="menu-item">Task</a>
                <a href="achievement.html" class="menu-item">Achievement</a>
                <a href="accounts.html" class="menu-item">Account</a>
            </nav>
        </div>
    </header>

    <main class="notes-page">
        <div class="container">
            <div class="page-header">
                <h1 class="page-title">Notes</h1>
                <p class="page-subtitle">Capture your thoughts instantly</p>
            </div>

            <div class="notes-grid" id="notesGrid">
                <!-- Notes will be dynamically populated -->
            </div>
        </div>
    </main>

    <!-- Floating Action Button -->
    <button class="fab" id="createNoteBtn" aria-label="Create new note">+</button>

    <!-- Note Editor Modal -->
    <div class="note-modal hidden" id="noteModal">
        <div class="note-editor">
            <div class="note-editor-header">
                <h2>Create Note</h2>
                <div class="editor-actions">
                    <button class="btn btn-cancel" id="cancelNoteBtn">Cancel</button>
                    <button class="btn btn-save" id="saveNoteBtn">Save</button>
                </div>
            </div>
            <div class="note-editor-body">
                <input type="text" id="noteTitle" class="note-title-input" placeholder="Note Title">
                <textarea id="noteContent" class="note-content-textarea" placeholder="Write your note here..."></textarea>
            </div>
        </div>
    </div>

    <!-- Cancel Confirmation Modal -->
    <div class="confirm-modal hidden" id="cancelConfirmModal">
        <div class="confirm-dialog">
            <div class="confirm-icon">?</div>
            <h3>Are you sure?</h3>
            <p>Are you sure you want to cancel writing this note? All unsaved content will be lost.</p>
            <div class="confirm-actions">
                <button class="btn btn-secondary" id="continueWritingBtn">Continue Writing</button>
                <button class="btn btn-cancel-confirm" id="confirmCancelBtn">Yes, Cancel</button>
            </div>
        </div>
    </div>

    <!-- Delete Confirmation Modal -->
    <div class="confirm-modal hidden" id="deleteConfirmModal">
        <div class="confirm-dialog">
            <div class="confirm-icon">🗑️</div>
            <h3>Delete Note?</h3>
            <p>This action cannot be undone.</p>
            <div class="confirm-actions">
                <button class="btn btn-secondary" id="cancelDeleteBtn">Cancel</button>
                <button class="btn btn-danger" id="confirmDeleteBtn">Delete</button>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
