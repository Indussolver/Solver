<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Achievements - Solver by Indus</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@200;300;400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <nav class="navbar">
        <div class="nav-container">
            <div class="logo">
                <div class="logo-main">Solver</div>
                <div class="logo-sub">by Indus</div>
            </div>
            <div class="nav-links">
                <a href="tasks.html" target="_blank" class="nav-item">Task</a>
                <a href="achievements.html" target="_blank" class="nav-item active">Achievement</a>
                <a href="rewards.html" target="_blank" class="nav-item">Rewards</a>
                <a href="account.html" target="_blank" class="nav-item">Account</a>
            </div>
        </div>
    </nav>

    <section class="page-content achievements-page">
        <div class="container">
            <h1 class="page-title">Achievements</h1>
            <p class="page-subtitle">Your productivity journey, visualized.</p>
            
            <div class="achievements-grid">
                <div class="achievement-card">
                    <div class="achievement-icon">🥉</div>
                    <h3>Beginner</h3>
                    <div class="progress-bar">
                        <div class="progress-fill" style="width: 100%"></div>
                    </div>
                    <span class="progress-text">5/5 tasks</span>
                </div>
                <div class="achievement-card">
                    <div class="achievement-icon">🥈</div>
                    <h3>Streak</h3>
                    <div class="progress-bar">
                        <div class="progress-fill" style="width: 60%"></div>
                    </div>
                    <span class="progress-text">3/7 days</span>
                </div>
            </div>
        </div>
    </section>
</body>
</html>
