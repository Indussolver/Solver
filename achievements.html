<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Achievements - Solver</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body class="page-transition">
    <header class="header">
        <div class="container">
            <h1 class="brand">Solver</h1>
            <button class="menu-toggle" aria-label="Menu">
                <span class="three-dots">⋮</span>
            </button>
            <nav class="dropdown-menu hidden">
                <a href="index.html" class="menu-item">Home</a>
                <a href="task.html" class="menu-item">Task</a>
                <a href="notes.html" class="menu-item">Notes</a>
                <a href="accounts.html" class="menu-item">Account</a>
            </nav>
        </div>
    </header>

    <main class="page-content">
        <div class="container">
            <div class="page-header">
                <h1 class="page-title">Achievements</h1>
                <p class="page-subtitle">Your productivity milestones</p>
            </div>

            <div class="achievements-grid" id="achievementsGrid">
                <div class="achievement-card locked">
                    <div class="achievement-icon">🎯</div>
                    <h3>Task Starter</h3>
                    <p>Complete 10 tasks</p>
                    <div class="achievement-progress">
                        <div class="progress-bar locked"></div>
                    </div>
                </div>
                <div class="achievement-card locked">
                    <div class="achievement-icon">🚀</div>
                    <h3>Productivity Pro</h3>
                    <p>Complete 50 tasks</p>
                    <div class="achievement-progress">
                        <div class="progress-bar locked"></div>
                    </div>
                </div>
                <div class="achievement-card locked">
                    <div class="achievement-icon">🏆</div>
                    <h3>Master Solver</h3>
                    <p>Complete 100 tasks</p>
                    <div class="achievement-progress">
                        <div class="progress-bar locked"></div>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <script src="script.js"></script>
</body>
</html>
